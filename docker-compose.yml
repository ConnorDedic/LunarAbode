services:
  site:
    image: ghcr.io/connordedic/lunarabode:main
    container_name: portfolio-site
    expose:
      - 80
    restart: unless-stopped

  guides:
    image: ghcr.io/connordedic/lunarabode:main
    container_name: guides-server
    working_dir: /app
    command: npm run guides
    expose:
      - 3001
    restart: unless-stopped
    volumes:
      - ./guides:/app/guides

  caddy:
    image: caddy:alpine
    container_name: caddy-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    environment:
      - ACME_AGREE=true

volumes:
  caddy-data:
  caddy-config:
