services:
  site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-site
    expose:
      - 80
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: caddy-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    environment:
      - ACME_AGREE=true

volumes:
  caddy-data:
  caddy-config:
